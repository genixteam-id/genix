<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genix Team | Links</title>
  
  <style>
    /* الإعدادات العامة - محاكاة solo.to */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1a1a1a; /* خلفية سوداء ناعمة */
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* القسم العلوي (الصورة والاسم) */
    .profile-header {
      width: 100%;
      text-align: center;
      padding: 40px 0 20px;
    }

    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(45deg, #4f46e5, #ec4899); /* خلفية ملونة للشعار */
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      border: 3px solid #333;
    }

    .profile-header h1 {
      font-size: 22px;
      margin: 5px 0;
      letter-spacing: 0.5px;
    }

    .location {
      font-size: 14px;
      color: #888;
      margin-bottom: 15px;
    }

    .bio {
      font-size: 15px;
      color: #ccc;
      margin-bottom: 30px;
    }

    /* حاوية الروابط (المكعبات) */
    .links-wrapper {
      width: 90%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 50px;
    }

    /* تصميم المكعب (الرابط) */
    .link-item {
      display: flex;
      align-items: center;
      background-color: #2b2b2b; /* لون المكعب الرمادي */
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: transform 0.2s, background-color 0.2s;
      position: relative;
    }

    .link-item:hover {
      background-color: #333;
      transform: translateY(-2px);
    }

    /* الدائرة الملونة للأيقونة */
    .icon-box {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-left: 15px; /* مسافة لليمين بسبب RTL */
    }

    /* نصوص الرابط */
    .text-box {
      display: flex;
      flex-direction: column;
      text-align: right;
      flex-grow: 1;
    }

    .title {
      font-weight: 600;
      font-size: 16px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    /* السهم الصغير جهة اليسار */
    .arrow {
      color: #555;
      font-size: 18px;
      padding-left: 10px;
    }

    /* ألوان الأيقونات مثل الصورة */
    .bg-email { background-color: #3b82f6; } /* أزرق */
    .bg-facebook { background-color: #1877f2; } /* أزرق فيسبوك */
    .bg-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .bg-tiktok { background-color: #000000; border: 1px solid #444; }
    .bg-whatsapp { background-color: #25d366; }
    .bg-web { background-color: #555; }
  </style>
</head>
<body>

  <div class="profile-header">
    <div class="profile-pic">G</div> <!-- يمكنك وضع صورة شعارك هنا مستقبلاً -->
    <h1>genix.team</h1>
    <div class="location">📍 ankara</div>
    <div class="bio">جميع الروابط الخاصة بنا تجدونها هنا</div>
  </div>

  <div class="links-wrapper">
    
    <!-- الموقع الرسمي -->
    <a href="https://Genix-id.com" class="link-item">
      <div class="icon-box bg-web">🌐</div>
      <div class="text-box">
        <span class="title">الموقع الرسمي</span>
        <span class="subtitle">Genix-id.com</span>
      </div>
      <div class="arrow">←</div>
    </a>

    <!-- البريد الإلكتروني -->
    <a href="mailto:Genix.team.id@gmail.com" class="link-item">
      <div class="icon-box bg-email">✉️</div>
      <div class="text-box">
        <span class="title">Email</span>
        <span class="subtitle">Genix.team.id@gmail.com</span>
      </div>
      <div class="arrow">←</div>
    </a>

    <!-- إنستغرام -->
    <a href="https://instagram.com/genix.team" class="link-item">
      <div class="icon-box bg-instagram">📸</div>
      <div class="text-box">
        <span class="title">Instagram</span>
        <span class="subtitle">@genix.team</span>
      </div>
      <div class="arrow">←</div>
    </a>

    <!-- واتساب -->
    <a href="https://wa.me/905527223847" class="link-item">
      <div class="icon-box bg-whatsapp">💬</div>
      <div class="text-box">
        <span class="title">WhatsApp</span>
        <span class="subtitle">+90 552 722 38 47</span>
      </div>
      <div class="arrow">←</div>
    </a>

  </div>

</body>
</html>
