<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genix Team</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #121212; /* خلفية سوداء */
      color: white;
      font-family: sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    .header { text-align: center; margin-top: 50px; margin-bottom: 30px; }
    .header h1 { font-size: 28px; margin: 0; }
    .header p { color: #888; margin-top: 5px; }

    .links-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }

    /* تصميم المكعب */
    .btn-link {
      display: flex; align-items: center;
      background: #1e1e1e; /* لون المكعب الرمادي */
      padding: 15px; border-radius: 12px;
      text-decoration: none; color: white;
      border: 1px solid #333; transition: 0.3s;
    }
    .btn-link:hover { background: #252525; transform: translateY(-2px); }

    /* الدائرة الملونة */
    .icon {
      width: 45px; height: 45px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-left: 15px; font-size: 20px;
    }
    
    /* ألوان الأيقونات الجديدة */
    .bg-web { background: #3b82f6; }
    .bg-mail { background: #ea4335; }
    .bg-wa { background: #25d366; }
    .bg-tiktok { background: #000000; border: 1px solid #444; }
    .bg-fb { background: #1877f2; }

    .text-content { display: flex; flex-direction: column; text-align: right; flex-grow: 1; }
    .title { font-weight: bold; font-size: 16px; }
    .sub { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>genix.team</h1>
    <p>📍 ankara</p>
    <p>جميع الروابط الخاصة بنا تجدونها هنا</p>
  </div>

  <div class="links-container">
    <!-- الموقع الرسمي -->
    <a href="https://Genix-id.com" class="btn-link">
      <div class="icon bg-web">🌐</div>
      <div class="text-content"><span class="title">الموقع الرسمي</span><span class="sub">Genix-id.com</span></div>
    </a>

    <!-- فيسبوك -->
    <a href="https://www.facebook.com/share/18B6R4fGbG/" class="btn-link">
      <div class="icon bg-fb">🔹</div>
      <div class="text-content"><span class="title">Facebook</span><span class="sub">تابعنا على فيسبوك</span></div>
    </a>

    <!-- تيك توك -->
    <a href="https://www.tiktok.com/@genix.team" class="btn-link">
      <div class="icon bg-tiktok">🎵</div>
      <div class="text-content"><span class="title">TikTok</span><span class="sub">@genix.team</span></div>
    </a>

    <!-- واتساب -->
    <a href="https://wa.me/905527223847" class="btn-link">
      <div class="icon bg-wa">💬</div>
      <div class="text-content"><span class="title">WhatsApp</span><span class="sub">+90 552 722 38 47</span></div>
    </a>

    <!-- البريد الإلكتروني -->
    <a href="mailto:Genix.team.id@gmail.com" class="btn-link">
      <div class="icon bg-mail">✉️</div>
      <div class="text-content"><span class="title">البريد الإلكتروني</span><span class="sub">Genix.team.id@gmail.com</span></div>
    </a>
  </div>
</body>
</html>
