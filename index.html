
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genix Team</title>
  
  <style>
    /* التنسيق المباشر لضمان ظهور المكعبات */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #0f172a; /* خلفية داكنة */
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 100vh;
    }

    .header-section {
      margin-top: 50px;
      margin-bottom: 30px;
    }

    .header-section h1 {
      font-size: 35px;
      margin-bottom: 5px;
    }

    .header-section p {
      opacity: 0.7;
      font-size: 18px;
    }

    /* حاوية المكعبات */
    .links-container {
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* تصميم المكعب (الزر الكبير) */
    .link-card {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #1e293b;
      color: white;
      text-decoration: none;
      border-radius: 15px;
      font-weight: bold;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* ألوان الحواف لتمييز المكعبات */
    .web { border-right: 6px solid #3b82f6; }
    .email { border-right: 6px solid #ef4444; }
    .whatsapp { border-right: 6px solid #22c55e; }

    .link-card:hover {
      background: #334155;
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <div class="header-section">
    <h1>Genix Team</h1>
    <p>الحلول الرقمية المتكاملة</p>
  </div>

  <div class="links-container">
    
    <a href="https://Genix-id.com" target="_blank" class="link-card web">
      🌐 الموقع الرسمي
    </a>

    <a href="mailto:Genix.team.id@gmail.com" class="link-card email">
      📧 البريد الإلكتروني
    </a>

    <a href="https://wa.me/905527223847" target="_blank" class="link-card whatsapp">
      🟢 واتساب مباشر
    </a>

  </div>

</body>
</html>
